<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MIMO ClaimPilot Agent</title>
  <style>
    :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { margin: 0; background: #f6f7fb; color: #171717; }
    header { padding: 40px 20px 22px; background: linear-gradient(135deg,#101828,#344054); color: white; }
    main { max-width: 1100px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    h1 { margin: 0 0 8px; font-size: 32px; }
    h2 { margin-top: 0; }
    .sub { opacity: .84; max-width: 900px; line-height: 1.7; }
    .card { background: white; border-radius: 18px; padding: 20px; box-shadow: 0 10px 30px rgba(16,24,40,.08); }
    label { display: block; font-weight: 700; margin: 12px 0 6px; }
    input, textarea { width: 100%; box-sizing: border-box; border: 1px solid #d0d5dd; border-radius: 12px; padding: 12px; font-size: 15px; background: #fff; }
    textarea { min-height: 140px; resize: vertical; }
    button { border: 0; border-radius: 12px; padding: 12px 16px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .primary { background: #101828; color: white; margin-top: 12px; }
    .ghost { background: #eef2ff; color: #263b7b; margin-right: 8px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0b1020; color: #d7e3ff; padding: 16px; border-radius: 14px; overflow: auto; }
    .pill { display:inline-block; padding: 4px 10px; border-radius: 99px; background: #eef2ff; color:#263b7b; font-size: 13px; margin-bottom: 10px; }
    ul { line-height: 1.7; }
    .timeline { border-left: 3px solid #d0d5dd; padding-left: 14px; }
    .item { margin: 10px 0; }
    .item b { color: #344054; }
    @media (max-width: 860px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>MIMO ClaimPilot Agent</h1>
    <div class="sub">上传或粘贴聊天记录、订单记录、物流记录、付款凭证等材料，自动整理为证据链、时间线、责任点和投诉文书。适合消费者维权、售后争议、二手交易纠纷、租房纠纷等场景。</div>
  </header>
  <main>
    <section class="card">
      <span class="pill">Agent Demo</span>
      <h2>输入材料</h2>
      <label>案例标题</label>
      <input id="caseTitle" value="商家承诺顺丰特快却发标快" />
      <label>我的目标</label>
      <input id="goal" value="希望平台介入，退还特快差价，并补偿因延误产生的直接损失" />
      <label>材料文本</label>
      <textarea id="materials">聊天记录：4月23日我反复告知商家急用，要求发顺丰特快，并补了特快差价，商家回复“可以，给你发顺丰特快”。
物流面单：实际服务产品显示为顺丰标快，并非顺丰特快。
付款凭证：额外支付 23 元运费差价。
影响说明：该物品用于第二天比赛调试，延误导致我必须重新购买替代件。</textarea>
      <button class="ghost" onclick="loadSample()">填入示例</button>
      <button class="primary" onclick="analyze()">生成证据链</button>
    </section>

    <section class="card">
      <span class="pill" id="mode">等待分析</span>
      <h2>分析结果</h2>
      <div id="result">点击“生成证据链”后显示结果。</div>
    </section>
  </main>
<script>
function loadSample(){
  document.getElementById('caseTitle').value = '课程培训退款争议';
  document.getElementById('goal').value = '希望退还未履行课程费用，并要求对方给出书面处理说明';
  document.getElementById('materials').value = `聊天记录：3月12日销售承诺“报名后不满意可退剩余课时费”，我因此付款 998 元。\n课程记录：实际只上了 2 次课，后续老师多次临时取消。\n沟通记录：4月2日我申请退款，对方回复“只能转课，不能退款”。\n付款凭证：微信支付 998 元。`;
}
async function analyze(){
  const result = document.getElementById('result');
  result.innerHTML = '分析中...';
  const body = {
    case_title: document.getElementById('caseTitle').value,
    goal: document.getElementById('goal').value,
    materials: [{name:'用户粘贴材料', content: document.getElementById('materials').value}]
  };
  try{
    const res = await fetch('/api/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    const data = await res.json();
    document.getElementById('mode').textContent = '模式：' + data.mode;
    result.innerHTML = render(data);
  }catch(e){ result.innerHTML = '<pre>' + e + '</pre>'; }
}
function render(data){
  const timeline = data.timeline.map(x => `<div class="item"><b>${escapeHtml(x.time)}</b><br>${escapeHtml(x.event)}<br><small>证据：${escapeHtml(x.evidence)}</small></div>`).join('');
  return `<h3>摘要</h3><p>${escapeHtml(data.summary)}</p>
  <h3>关键事实</h3><ul>${data.extracted_facts.map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>
  <h3>时间线</h3><div class="timeline">${timeline}</div>
  <h3>风险与责任点</h3><ul>${data.risk_points.map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>
  <h3>150字申诉</h3><pre>${escapeHtml(data.short_appeal_150)}</pre>
  <h3>完整投诉信</h3><pre>${escapeHtml(data.full_letter)}</pre>`;
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
</script>
</body>
</html>
